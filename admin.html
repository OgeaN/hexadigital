<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Paneli | Hexadigital</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/shop.css">
</head>
<body>
    <canvas id="hexa-bg"></canvas>

    <header class="header">
        <div class="container header__container">
            <a href="index.html" class="logo">
                <img src="assets/logohorizontal.png" alt="Hexadigital Logo">
            </a>
            <nav class="nav">
                <ul class="nav__list">
                    <li class="nav__item"><a href="index.html" class="nav__link">Ana Sayfa</a></li>
                    <li class="nav__item"><a href="shop.html" class="nav__link">Mağaza</a></li>
                    <li class="nav__item"><a href="admin.html" class="nav__link" style="color: var(--color-primary);">Admin</a></li>
                </ul>
            </nav>
            <button class="mobile-menu-btn" aria-label="Menüyü Aç">
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="services" style="min-height: 70vh; padding-top: calc(var(--header-height) + var(--spacing-lg));">
            <div class="container">

                <!-- 1) Yükleniyor durumu -->
                <div id="admin-loading" class="admin-message">Yükleniyor...</div>

                <!-- 2) Giriş ekranı (oturum yokken) -->
                <div id="admin-login" class="admin-login" style="display:none;">
                    <h2 class="section-title">Admin Girişi</h2>
                    <p>Ürünleri yönetmek için yetkili Google hesabınızla giriş yapın.</p>
                    <button class="btn btn--primary btn-google" id="btn-google-signin">
                        <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C39.9 36.4 44 30.8 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
                        Google ile Giriş Yap
                    </button>
                    <div id="login-error" class="admin-message error" style="display:none;"></div>
                </div>

                <!-- 3) Yönetim paneli (yetkili oturum) -->
                <div id="admin-panel" style="display:none;">
                    <div class="admin-bar">
                        <div class="admin-bar__user">
                            Giriş: <strong id="admin-email"></strong>
                        </div>
                        <div style="display:flex; gap:0.5rem;">
                            <button class="btn btn--ghost btn-sm" id="btn-seed">Örnek Verileri Yükle</button>
                            <button class="btn btn--ghost btn-sm" id="btn-signout">Çıkış Yap</button>
                        </div>
                    </div>

                    <!-- Ürün Ekle / Düzenle formu -->
                    <form class="admin-form" id="product-form">
                        <h3 id="form-heading">Yeni Ürün Ekle</h3>
                        <input type="hidden" id="edit-id">

                        <div class="form-row">
                            <label for="p-name">Ürün Adı *</label>
                            <input type="text" id="p-name" required placeholder="Örn: HexaBoard Pro">
                        </div>

                        <div class="form-row">
                            <label for="p-desc">Açıklama</label>
                            <textarea id="p-desc" placeholder="Kısa ürün açıklaması"></textarea>
                        </div>

                        <div class="form-grid">
                            <div class="form-row">
                                <label for="p-price">Fiyat (TL) *</label>
                                <input type="number" id="p-price" required min="0" step="1" placeholder="1499">
                            </div>
                            <div class="form-row">
                                <label>Görünürlük</label>
                                <label class="form-check">
                                    <input type="checkbox" id="p-visible" checked>
                                    Mağazada görünsün
                                </label>
                            </div>
                        </div>

                        <!-- Düzenlemede: mevcut görseller (tıkla-sil) -->
                        <div class="form-row" id="existing-images-row" style="display:none;">
                            <label>Mevcut Görseller (kaldırmak için ×'e tıkla)</label>
                            <div class="img-thumbs" id="existing-images"></div>
                        </div>

                        <div class="form-row">
                            <label for="p-image-file">Görsel Yükle (birden fazla seçilebilir)</label>
                            <input type="file" id="p-image-file" accept="image/*" multiple>
                            <p class="form-hint">Firebase Storage'a yüklenir. Birden çok dosya seçebilirsiniz.</p>
                        </div>

                        <div class="form-row">
                            <label for="p-image-urls">veya Görsel URL'leri (her satıra bir adet)</label>
                            <textarea id="p-image-urls" rows="3" placeholder="https://...&#10;https://..."></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn--primary" id="btn-save">Kaydet</button>
                            <button type="button" class="btn btn--ghost" id="btn-cancel" style="display:none;">İptal</button>
                        </div>
                        <div id="form-status" class="admin-message" style="display:none; text-align:left; padding-left:0;"></div>
                    </form>

                    <!-- Ürün listesi -->
                    <h3 style="margin-bottom: var(--spacing-md);">Ürünler</h3>
                    <div class="admin-list" id="admin-list"></div>
                    <div id="list-status" class="admin-message">Yükleniyor...</div>
                </div>

            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer__container">
            <div class="footer__brand">
                <img src="assets/logo.png" alt="Hexadigital" class="footer__logo">
                <p>&copy; 2025 Hexadigital. Tüm hakları saklıdır.</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
