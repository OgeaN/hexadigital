<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sipariş Detayı | Hexadigital</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/shop.css">
</head>
<body>
    <canvas id="hexa-bg"></canvas>

    <header class="header">
        <div class="container header__container">
            <a href="index.html" class="logo">
                <img src="assets/logohorizontal.png" alt="Hexadigital Logo">
            </a>
            <nav class="nav">
                <ul class="nav__list">
                    <li class="nav__item"><a href="index.html" class="nav__link">Ana Sayfa</a></li>
                    <li class="nav__item"><a href="shop.html" class="nav__link">Mağaza</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="services" style="min-height: 70vh; padding-top: calc(var(--header-height) + var(--spacing-lg));">
            <div class="container" style="max-width: 760px;">

                <div class="order-head">
                    <div>
                        <h1 class="section-title" style="margin-bottom:0;">Sipariş Detayı</h1>
                        <p class="order-meta" id="order-meta"></p>
                    </div>
                    <button class="btn btn--primary" id="btn-pdf" style="display:none;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        PDF İndir
                    </button>
                </div>

                <!-- Durum mesajı -->
                <div class="shop-status" id="order-status">Sipariş yükleniyor...</div>

                <!-- Sipariş öğeleri -->
                <div class="order-items" id="order-items"></div>

                <!-- Toplam -->
                <div class="order-total" id="order-total" style="display:none;">
                    <span>Toplam</span>
                    <strong id="order-total-amount"></strong>
                </div>

            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer__container">
            <div class="footer__brand">
                <img src="assets/logo.png" alt="Hexadigital" class="footer__logo">
                <p>&copy; 2025 Hexadigital. Tüm hakları saklıdır.</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/siparis.js"></script>
</body>
</html>
